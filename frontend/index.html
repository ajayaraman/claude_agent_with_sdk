<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Claude Agent SDK — Multi-Agent Orchestrator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #0b0d12;
      --panel: #11141c;
      --panel-2: #161a25;
      --panel-3: #1d2230;
      --border: #232838;
      --muted: #8a93a6;
      --text: #e7ebf3;
      --dim: #b6bdce;
      --accent: #7aa2ff;
      --warn: #ffcb6b;
      --err: #ff7a7a;
      --ok: #7be3a4;
      --orchestrator: #7aa2ff;
      --architect:    #b5a0ff;
      --coder:        #7be3a4;
      --test-writer:  #ffcb6b;
      --reviewer:     #61d6ff;
      --critic:       #ff9aa2;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font: 13px/1.55 ui-monospace, SFMono-Regular, Menlo, monospace;
      background: var(--bg); color: var(--text);
    }
    button { font: inherit; }

    .app {
      display: grid;
      grid-template-columns: 360px 1fr 320px;
      grid-template-rows: 48px 1fr;
      height: 100%;
    }
    .topbar {
      grid-column: 1 / -1;
      display: flex; align-items: center; gap: 16px;
      padding: 0 16px; border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    .topbar h1 { font-size: 13px; margin: 0; font-weight: 600; }
    .topbar .meta { color: var(--muted); font-size: 12px; }
    .topbar .right { margin-left: auto; display: flex; gap: 12px; align-items: center; }
    .pill { padding: 2px 8px; border-radius: 10px; font-size: 11px; background: var(--panel-3); color: var(--dim); }
    .pill.ok { color: var(--ok); }
    .pill.warn { color: var(--warn); }
    .pill.err { color: var(--err); }

    .col { min-height: 0; height: 100%; display: flex; flex-direction: column; overflow: hidden; }
    .col.left   { border-right: 1px solid var(--border); }
    .col.right  { border-left: 1px solid var(--border); }

    .pane-title {
      padding: 8px 14px; font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--muted); border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      background: var(--panel);
    }

    /* ---- Chat pane (left) ---- */
    .chat-log { flex: 1; overflow-y: auto; padding: 10px 14px; }
    .chat-msg { margin: 6px 0; }
    .chat-msg .who { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .chat-msg .body { white-space: pre-wrap; word-break: break-word; padding: 4px 8px; border-radius: 6px; background: var(--panel-2); margin-top: 2px; }
    .chat-msg.user .body { background: #18243a; }
    .chat-msg.queued .body { background: #2c2614; color: var(--warn); }
    .chat-msg.system .body { background: var(--panel); color: var(--muted); font-size: 12px; }
    .chat-msg.assistant .body { background: var(--panel-2); border-left: 2px solid var(--orchestrator); }

    .chat-input {
      border-top: 1px solid var(--border); padding: 10px 12px; display: flex;
      gap: 8px; flex-direction: column; background: var(--panel);
    }
    .chat-input textarea {
      width: 100%; min-height: 64px; resize: vertical;
      background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
      border-radius: 6px; padding: 8px 10px; font: inherit;
    }
    .chat-input .row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .btn {
      padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--panel-3); color: var(--text); cursor: pointer;
    }
    .btn.primary { background: var(--accent); color: #0a0d14; border-color: var(--accent); }
    .btn.danger { color: var(--err); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .chat-input label { font-size: 11px; color: var(--muted); display: flex; gap: 4px; align-items: center; }

    /* ---- Activity pane (center) ---- */
    .agents-row {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
      padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--panel);
    }
    .agent-pill {
      background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px;
      padding: 6px 8px; text-align: center; opacity: 0.4; transition: all .15s;
      font-size: 11px;
    }
    .agent-pill.active { opacity: 1; box-shadow: 0 0 0 2px currentColor inset; }
    .agent-pill.done   { opacity: 0.85; border-color: currentColor; }
    .agent-pill .name  { font-weight: 600; display: block; font-size: 12px; }
    .agent-pill .meta  { color: var(--muted); font-size: 10px; }
    .agent-pill[data-agent="architect"]   { color: var(--architect); }
    .agent-pill[data-agent="coder"]       { color: var(--coder); }
    .agent-pill[data-agent="test-writer"] { color: var(--test-writer); }
    .agent-pill[data-agent="reviewer"]    { color: var(--reviewer); }
    .agent-pill[data-agent="critic"]      { color: var(--critic); }

    .feed { flex: 1; overflow-y: auto; padding: 12px 14px; }

    .ev {
      margin: 4px 0; border-left: 3px solid var(--border);
      padding: 6px 10px; border-radius: 0 6px 6px 0; background: var(--panel-2);
    }
    .ev .head {
      display: flex; gap: 8px; align-items: center; font-size: 11px;
      color: var(--muted); margin-bottom: 3px;
    }
    .ev .head .agent { font-weight: 600; color: var(--dim); }
    .ev .head .ts { margin-left: auto; }
    .ev .body { white-space: pre-wrap; word-break: break-word; font-size: 13px; color: var(--text); }
    .ev pre {
      margin: 4px 0 0 0; padding: 6px 8px; background: #07090e;
      border-radius: 4px; font-size: 11px; max-height: 220px; overflow: auto;
      color: var(--dim);
    }
    /* Markdown body styling — applies inside .body-md */
    .body-md p { margin: 6px 0; }
    .body-md h1, .body-md h2, .body-md h3, .body-md h4 { margin: 10px 0 4px; line-height: 1.25; }
    .body-md h1 { font-size: 16px; }
    .body-md h2 { font-size: 14px; }
    .body-md h3 { font-size: 13px; color: var(--dim); }
    .body-md h4 { font-size: 12px; color: var(--muted); }
    .body-md ul, .body-md ol { margin: 4px 0 4px 18px; padding: 0; }
    .body-md li { margin: 2px 0; }
    .body-md code.md-inline {
      background: #07090e; color: #ffd9a8; padding: 1px 5px;
      border-radius: 3px; font-size: 12px;
    }
    .body-md pre.md-code {
      background: #07090e; color: var(--dim); padding: 8px 10px;
      border-radius: 4px; font-size: 11px; overflow: auto;
      max-height: 320px; margin: 6px 0;
    }
    .body-md strong { color: #fff; }
    .body-md a { color: var(--accent); }

    /* Delegation block — prominent final-answer panel */
    .delegation .agent-answer {
      background: #0c1320; border: 1px solid var(--border);
      padding: 10px 12px; border-radius: 6px; margin: 8px 0 4px;
    }
    .delegation .agent-answer .label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--muted); margin-bottom: 4px;
    }
    .delegation[data-subagent="architect"]   .agent-answer { border-left: 3px solid var(--architect); }
    .delegation[data-subagent="coder"]       .agent-answer { border-left: 3px solid var(--coder); }
    .delegation[data-subagent="test-writer"] .agent-answer { border-left: 3px solid var(--test-writer); }
    .delegation[data-subagent="reviewer"]    .agent-answer { border-left: 3px solid var(--reviewer); }
    .delegation[data-subagent="critic"]      .agent-answer {
      border-left: 3px solid var(--critic);
      background: #1c1014;
    }

    /* Compact one-line tool rows */
    .tool-row {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 10px; margin: 3px 0;
      border-left: 3px solid var(--warn); background: var(--panel-2);
      border-radius: 0 4px 4px 0; font-size: 12px;
    }
    .tool-row.done    { border-left-color: var(--ok); }
    .tool-row.error   { border-left-color: var(--err); }
    .tool-row .agent  { color: var(--muted); font-size: 10px; min-width: 60px; }
    .tool-row .tool   { font-weight: 600; min-width: 60px; }
    .tool-row .arg    { color: var(--dim); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tool-row .status { font-size: 11px; color: var(--muted); margin-left: auto; }
    .tool-row .res    { color: var(--ok); font-size: 11px; flex: 1; white-space: pre; overflow: hidden; text-overflow: ellipsis; }
    .tool-row.error .res { color: var(--err); }
    .tool-row .twirl  {
      width: 10px; height: 10px; border: 2px solid var(--warn);
      border-top-color: transparent; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .tool-row.done .twirl, .tool-row.error .twirl { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* "Show details" toggle */
    .details-toggle {
      cursor: pointer; user-select: none; font-size: 10px;
      color: var(--muted); margin-left: 8px;
    }
    .details-toggle:hover { color: var(--text); }
    .tool-row .details {
      width: 100%; margin-top: 6px; display: none;
    }
    .tool-row.show-details .details { display: block; }
    .tool-row .details pre {
      margin: 4px 0; padding: 6px 8px; background: #07090e;
      border-radius: 4px; font-size: 11px; max-height: 240px; overflow: auto;
      color: var(--dim);
    }

    .ev.text       { border-left-color: var(--orchestrator); }
    .ev.text[data-scope="orchestrator"] { border-left-color: var(--orchestrator); }
    .ev.text[data-scope="architect"]    { border-left-color: var(--architect); }
    .ev.text[data-scope="coder"]        { border-left-color: var(--coder); }
    .ev.text[data-scope="test-writer"]  { border-left-color: var(--test-writer); }
    .ev.text[data-scope="reviewer"]     { border-left-color: var(--reviewer); }
    .ev.text[data-scope="critic"]       { border-left-color: var(--critic); }
    .ev.tool-use     { border-left-color: var(--warn); background: #1f1c12; }
    .ev.tool-result  { border-left-color: var(--ok);   background: #11231a; }
    .ev.thinking     { border-left-color: #6a4a8a; background: #1a132a; color: var(--muted); }
    .ev.error        { border-left-color: var(--err); background: #2a1414; }
    .ev.turn-mark    { border-left-color: var(--accent); background: #131a2a; }
    .ev.system       { border-left-color: var(--border); color: var(--muted); }

    /* Delegation block — collapsible nested container */
    .delegation {
      margin: 8px 0; border: 1px solid var(--border); border-radius: 8px;
      background: var(--panel-2); overflow: hidden;
    }
    .delegation > .delegation-head {
      display: flex; align-items: center; gap: 8px; padding: 8px 12px;
      cursor: pointer; user-select: none; background: var(--panel-3);
      font-size: 12px;
    }
    .delegation > .delegation-head .chev { width: 12px; transition: transform .12s; }
    .delegation.collapsed > .delegation-head .chev { transform: rotate(-90deg); }
    .delegation > .delegation-head .name { font-weight: 700; }
    .delegation > .delegation-head .desc { color: var(--muted); }
    .delegation > .delegation-head .status { margin-left: auto; }
    .delegation > .delegation-body { padding: 8px 12px; border-top: 1px solid var(--border); }
    .delegation.collapsed > .delegation-body { display: none; }
    .delegation[data-subagent="architect"]   { border-color: var(--architect); }
    .delegation[data-subagent="coder"]       { border-color: var(--coder); }
    .delegation[data-subagent="test-writer"] { border-color: var(--test-writer); }
    .delegation[data-subagent="reviewer"]    { border-color: var(--reviewer); }
    .delegation[data-subagent="critic"]      { border-color: var(--critic); }
    .delegation[data-subagent="architect"]   > .delegation-head { color: var(--architect); }
    .delegation[data-subagent="coder"]       > .delegation-head { color: var(--coder); }
    .delegation[data-subagent="test-writer"] > .delegation-head { color: var(--test-writer); }
    .delegation[data-subagent="reviewer"]    > .delegation-head { color: var(--reviewer); }
    .delegation[data-subagent="critic"]      > .delegation-head { color: var(--critic); }

    /* ---- Workspace pane (right) ---- */
    .ws-list { flex: 1; overflow-y: auto; padding: 8px 12px; }
    .ws-empty { color: var(--muted); padding: 8px; font-size: 12px; }
    .ws-file {
      display: flex; justify-content: space-between; align-items: center;
      padding: 5px 8px; border-radius: 4px; cursor: pointer;
      font-size: 12px;
    }
    .ws-file:hover { background: var(--panel-3); }
    .ws-file .size { color: var(--muted); font-size: 11px; }

    .file-viewer {
      border-top: 1px solid var(--border); height: 40%; overflow: hidden;
      display: flex; flex-direction: column;
    }
    .file-viewer.hidden { display: none; }
    .file-viewer .head {
      padding: 6px 10px; font-size: 11px; color: var(--muted);
      border-bottom: 1px solid var(--border); background: var(--panel);
      display: flex; justify-content: space-between; align-items: center;
    }
    .file-viewer pre {
      margin: 0; padding: 8px 10px; flex: 1; overflow: auto;
      font-size: 11px; color: var(--dim); background: #07090e;
    }
    .file-viewer .close-x { cursor: pointer; color: var(--muted); }

    .badge {
      display: inline-block; padding: 1px 6px; border-radius: 10px;
      font-size: 10px; background: var(--panel-3); color: var(--dim);
    }
    .badge.warn { background: #3a2e10; color: var(--warn); }
    .badge.ok   { background: #103a25; color: var(--ok); }
    .badge.err  { background: #3a1a1a; color: var(--err); }
  </style>
</head>
<body>
<div class="app">

  <!-- ============= TOP BAR ============= -->
  <div class="topbar">
    <h1>Claude Agent SDK · Multi-Agent Orchestrator</h1>
    <span class="meta" id="project-meta">project: …</span>
    <div class="right">
      <span class="pill" id="cost-pill">cost: $0.0000</span>
      <span class="pill" id="turns-pill">turns: 0</span>
      <span class="pill" id="conn-pill">connecting…</span>
    </div>
  </div>

  <!-- ============= LEFT: chat ============= -->
  <section class="col left">
    <div class="pane-title">
      <span>Chat</span>
      <span class="badge" id="queue-badge">queue: 0</span>
    </div>
    <div class="chat-log" id="chat-log"></div>
    <div class="chat-input">
      <textarea id="input" placeholder="First message: describe a coding task. After the pipeline finishes, keep chatting — the orchestrator stays in session."></textarea>
      <div class="row">
        <button class="btn primary" id="send-btn">Send</button>
        <button class="btn" id="interrupt-btn">Interrupt</button>
        <button class="btn" id="reset-btn">New session</button>
        <button class="btn" id="clear-btn">Clear workspace</button>
      </div>
    </div>
  </section>

  <!-- ============= CENTER: activity ============= -->
  <section class="col">
    <div class="pane-title">
      <span>Agent Activity</span>
      <span class="meta" id="status-meta">idle</span>
    </div>

    <div class="agents-row">
      <div class="agent-pill" data-agent="architect">  <span class="name">Architect</span>  <span class="meta">plans</span></div>
      <div class="agent-pill" data-agent="coder">      <span class="name">Coder</span>      <span class="meta">writes code</span></div>
      <div class="agent-pill" data-agent="test-writer"><span class="name">Test Writer</span><span class="meta">writes tests</span></div>
      <div class="agent-pill" data-agent="reviewer">   <span class="name">Reviewer</span>   <span class="meta">reads &amp; flags</span></div>
      <div class="agent-pill" data-agent="critic">     <span class="name">Critic</span>     <span class="meta">verdict</span></div>
    </div>

    <div class="feed" id="feed"></div>
  </section>

  <!-- ============= RIGHT: workspace ============= -->
  <section class="col right">
    <div class="pane-title">
      <span>Workspace</span>
      <span class="badge" id="ws-count">0 files</span>
    </div>
    <div class="ws-list" id="ws-list"><div class="ws-empty">no files yet</div></div>
    <div class="file-viewer hidden" id="file-viewer">
      <div class="head">
        <span id="file-viewer-path">file</span>
        <span class="close-x" id="file-viewer-close">×</span>
      </div>
      <pre id="file-viewer-body"></pre>
    </div>
  </section>

</div>

<script>
/* ============================================================
   Frontend wiring
   ============================================================ */

// SCRIPT-START BREADCRUMB. If the topbar status shows "js: running"
// the script reached this line. If it stays "js: not started" then JS
// is being blocked or the browser served a cached page.
try {
  document.title = 'multi-agent · js running';
  // scribble into the topbar status as soon as it exists
  const s = document.getElementById('conn-pill');
  if (s) { s.textContent = 'js: running'; s.className = 'pill'; }
} catch (_e) {}

// Surface every uncaught error visibly so we never get a silent failure again.
window.addEventListener('error', (e) => {
  const banner = document.createElement('div');
  banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;padding:10px 14px;background:#3a1414;color:#ffb4b4;font:12px/1.4 ui-monospace,monospace;border-bottom:2px solid #ff7a7a;white-space:pre-wrap';
  banner.textContent = `JS ERROR · ${e.message}\n  at ${e.filename}:${e.lineno}:${e.colno}`;
  document.body.appendChild(banner);
});
window.addEventListener('unhandledrejection', (e) => {
  console.error('[unhandled rejection]', e.reason);
});

const $ = (s) => document.querySelector(s);
const $$ = (s) => Array.from(document.querySelectorAll(s));

const chatLog = $('#chat-log');
const feed    = $('#feed');
const wsList  = $('#ws-list');
const wsCount = $('#ws-count');
const input   = $('#input');
const conn    = $('#conn-pill');
const costPill = $('#cost-pill');
const turnsPill = $('#turns-pill');
const queueBadge = $('#queue-badge');
const statusMeta = $('#status-meta');
const projectMeta = $('#project-meta');

const fileViewer = $('#file-viewer');
const fileViewerPath = $('#file-viewer-path');
const fileViewerBody = $('#file-viewer-body');
$('#file-viewer-close').onclick = () => fileViewer.classList.add('hidden');

let ws = null;
let totalCost = 0;
let totalTurns = 0;
let queueSize = 0;
let currentTurn = 0;
let inFlight = false;

/* Stack of DOM containers. The deepest one is where new events go.
   delegate_start pushes a new <.delegation> body; delegate_done pops. */
let containerStack = [feed];
const topContainer = () => containerStack[containerStack.length - 1];

/* Map of tool_use_id -> tool-row element, so tool_result can find the
   matching row and append to it instead of creating a separate event. */
const toolRows = new Map();
/* Map of tool_use_id -> delegation element, for finding the right block
   to update on delegate_done. */
const delegationBlocks = new Map();

/* ---------- minimal markdown renderer ---------- */
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function renderMarkdown(md) {
  if (!md) return '';
  // Pull fenced code blocks out first so we don't mangle them.
  const fenced = [];
  md = md.replace(/```([a-zA-Z0-9_+-]*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    fenced.push(`<pre class="md-code"><code>${escapeHtml(code.replace(/\n$/,''))}</code></pre>`);
    return `␀F${fenced.length - 1}␀`;
  });
  // Escape everything else.
  md = escapeHtml(md);
  // Inline code (after escaping so the escaped backticks don't trip us)
  md = md.replace(/`([^`\n]+)`/g, '<code class="md-inline">$1</code>');
  // Headings
  md = md.replace(/^####\s+(.*)$/gm, '<h4>$1</h4>')
         .replace(/^###\s+(.*)$/gm, '<h3>$1</h3>')
         .replace(/^##\s+(.*)$/gm,  '<h2>$1</h2>')
         .replace(/^#\s+(.*)$/gm,   '<h1>$1</h1>');
  // Bold then italic
  md = md.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  md = md.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
  // Lists — group consecutive bullet/numbered lines
  md = md.replace(/(^|\n)((?:[-*]\s+.+(?:\n|$))+)/g, (_, lead, block) => {
    const items = block.trim().split('\n').map(l => l.replace(/^[-*]\s+/, ''));
    return lead + '<ul>' + items.map(i => `<li>${i}</li>`).join('') + '</ul>';
  });
  md = md.replace(/(^|\n)((?:\d+\.\s+.+(?:\n|$))+)/g, (_, lead, block) => {
    const items = block.trim().split('\n').map(l => l.replace(/^\d+\.\s+/, ''));
    return lead + '<ol>' + items.map(i => `<li>${i}</li>`).join('') + '</ol>';
  });
  // Paragraphs — wrap blocks separated by blank lines, unless already a block tag
  const blocks = md.split(/\n{2,}/).map(b => {
    const t = b.trim();
    if (!t) return '';
    if (/^<(h[1-6]|ul|ol|pre|blockquote|p|div)/.test(t)) return t;
    return '<p>' + t.replace(/\n/g, '<br/>') + '</p>';
  });
  md = blocks.join('\n');
  // Restore fenced blocks.
  md = md.replace(/␀F(\d+)␀/g, (_, i) => fenced[+i]);
  return md;
}

/* ---------- helpers ---------- */
function setConn(state, msg) {
  conn.className = `pill ${state}`;
  conn.textContent = msg;
}
function setStatus(msg, klass='') {
  statusMeta.textContent = msg;
  statusMeta.className = 'meta ' + klass;
}
function bumpQueue(n) {
  queueSize = n;
  queueBadge.textContent = `queue: ${n}`;
  queueBadge.className = n > 0 ? 'badge warn' : 'badge';
}
// The SDK's ResultMessage.total_cost_usd is CUMULATIVE for the entire
// conversation, not per-turn. So we replace, not add.
function setCumulativeCost(value) {
  if (typeof value === 'number' && value >= 0) totalCost = value;
  costPill.textContent = `cost: $${totalCost.toFixed(4)}`;
}
function resetCost() {
  totalCost = 0;
  costPill.textContent = 'cost: $0.0000';
}
function bumpTurns() {
  totalTurns += 1;
  turnsPill.textContent = `turns: ${totalTurns}`;
}

function chatMsg(role, body) {
  const wrap = document.createElement('div');
  wrap.className = `chat-msg ${role}`;
  const who = document.createElement('div');
  who.className = 'who';
  who.textContent = role;
  const b = document.createElement('div');
  b.className = 'body';
  b.textContent = body;
  wrap.append(who, b);
  chatLog.appendChild(wrap);
  chatLog.scrollTop = chatLog.scrollHeight;
}

function ev(klass, scope, headBits, body, raw) {
  const el = document.createElement('div');
  el.className = `ev ${klass}`;
  if (scope) el.setAttribute('data-scope', scope);
  const head = document.createElement('div');
  head.className = 'head';
  const ts = new Date().toLocaleTimeString();
  head.innerHTML = `<span class="agent">${scope || 'system'}</span> <span>${headBits.join(' • ')}</span> <span class="ts">${ts}</span>`;
  el.appendChild(head);
  if (body !== undefined && body !== null && body !== '') {
    const b = document.createElement('div');
    b.className = 'body';
    b.textContent = body;
    el.appendChild(b);
  }
  if (raw !== undefined && raw !== null) {
    const pre = document.createElement('pre');
    pre.textContent = typeof raw === 'string' ? raw : JSON.stringify(raw, null, 2);
    el.appendChild(pre);
  }
  topContainer().appendChild(el);
  feed.scrollTop = feed.scrollHeight;
  return el;
}

function openDelegation(subagent, prompt, description, toolUseId) {
  const el = document.createElement('div');
  el.className = 'delegation';
  el.setAttribute('data-subagent', subagent);

  const head = document.createElement('div');
  head.className = 'delegation-head';
  head.innerHTML = `
    <span class="chev">▾</span>
    <span class="name">→ ${escapeHtml(subagent)}</span>
    <span class="desc">${description ? '· ' + escapeHtml(description) : ''}</span>
    <span class="status badge warn">running</span>
  `;
  head.onclick = () => el.classList.toggle('collapsed');

  const bodyWrap = document.createElement('div');
  bodyWrap.className = 'delegation-body';

  if (prompt) {
    // Prompt sent to subagent — collapsed by default; click to expand.
    const det = document.createElement('details');
    det.style.cssText = 'margin: 4px 0 8px; font-size: 11px; color: var(--muted);';
    const sum = document.createElement('summary');
    sum.style.cssText = 'cursor: pointer; user-select: none;';
    sum.textContent = '▸ prompt sent to ' + subagent;
    const pre = document.createElement('pre');
    pre.style.cssText = 'margin: 4px 0 0; padding: 6px 8px; background: #07090e; border-radius: 4px; font-size: 11px; max-height: 240px; overflow: auto; color: var(--dim);';
    pre.textContent = prompt;
    det.append(sum, pre);
    bodyWrap.appendChild(det);
  }

  el.append(head, bodyWrap);
  topContainer().appendChild(el);
  containerStack.push(bodyWrap);
  if (toolUseId) delegationBlocks.set(toolUseId, el);
  feed.scrollTop = feed.scrollHeight;
  return el;
}

function closeDelegation(subagent, agentText, toolUseId) {
  // Pop the matching delegation body off the container stack.
  if (containerStack.length > 1) {
    containerStack.pop();
  }
  const dele = (toolUseId && delegationBlocks.get(toolUseId))
            || feed.querySelector(`.delegation[data-subagent="${subagent}"]:last-of-type`);
  if (!dele) return;
  delegationBlocks.delete(toolUseId);

  const status = dele.querySelector('.status');
  if (status) { status.className = 'status badge ok'; status.textContent = 'done'; }

  // Render the subagent's actual narrative answer prominently in markdown.
  if (agentText && agentText.trim()) {
    const ans = document.createElement('div');
    ans.className = 'agent-answer body-md';
    ans.innerHTML =
      `<div class="label">${escapeHtml(subagent)}'s answer</div>` +
      renderMarkdown(agentText);
    const bodyWrap = dele.querySelector('.delegation-body');
    if (bodyWrap) bodyWrap.appendChild(ans);
  }
}

/* Render a single compact tool row. Returns the row element so tool_result
   can find it and update its trailing summary. */
function renderToolRow(agent, tool, summary, input, toolUseId) {
  const row = document.createElement('div');
  row.className = 'tool-row';
  row.setAttribute('data-tool-use-id', toolUseId || '');

  row.innerHTML = `
    <span class="twirl"></span>
    <span class="agent">${escapeHtml(agent)}</span>
    <span class="tool">${escapeHtml(tool)}</span>
    <span class="arg" title="${escapeHtml(summary || '')}">${escapeHtml(summary || '')}</span>
    <span class="status">running…</span>
    <span class="details-toggle">details</span>
  `;
  // details panel (hidden by default; raw input + later raw result)
  const details = document.createElement('div');
  details.className = 'details';
  if (input !== undefined && input !== null) {
    const pre = document.createElement('pre');
    pre.textContent = typeof input === 'string' ? input : JSON.stringify(input, null, 2);
    details.appendChild(pre);
  }
  row.appendChild(details);

  row.querySelector('.details-toggle').onclick = () => row.classList.toggle('show-details');

  topContainer().appendChild(row);
  if (toolUseId) toolRows.set(toolUseId, row);
  feed.scrollTop = feed.scrollHeight;
  return row;
}

/* Update the matching tool row with its result summary and a ✓/✗. */
function completeToolRow(toolUseId, summary, isError) {
  const row = (toolUseId && toolRows.get(toolUseId)) || null;
  if (!row) {
    // orphan result — render as its own row so we don't drop info
    const r = document.createElement('div');
    r.className = 'tool-row done' + (isError ? ' error' : '');
    r.innerHTML = `<span class="agent">tool</span><span class="status">${isError ? '✗' : '✓'}</span><span class="res">${escapeHtml((summary||'').slice(0,500))}</span>`;
    topContainer().appendChild(r);
    feed.scrollTop = feed.scrollHeight;
    return;
  }
  toolRows.delete(toolUseId);
  row.classList.add(isError ? 'error' : 'done');
  const status = row.querySelector('.status');
  if (status) status.textContent = isError ? '✗ failed' : '✓ done';
  // Replace the arg with the result summary on a successful single-line return,
  // or append a small res row if the result is multi-line / informative.
  const resTextRaw = (summary || '').toString();
  const oneLine = !resTextRaw.includes('\n') && resTextRaw.length < 200;
  if (oneLine && resTextRaw) {
    // Show the original arg as the title, surface the result inline.
    const argEl = row.querySelector('.arg');
    const resSpan = document.createElement('span');
    resSpan.className = 'res';
    resSpan.textContent = ' → ' + resTextRaw;
    argEl.appendChild(resSpan);
  } else if (resTextRaw) {
    const det = row.querySelector('.details');
    const pre = document.createElement('pre');
    pre.style.borderLeft = '2px solid ' + (isError ? 'var(--err)' : 'var(--ok)');
    pre.textContent = resTextRaw;
    det.appendChild(pre);
    row.classList.add('show-details');
  }
}

function setPill(agent, state) {
  const pill = document.querySelector(`.agent-pill[data-agent="${agent}"]`);
  if (!pill) return;
  pill.classList.remove('active', 'done');
  if (state) pill.classList.add(state);
}
function resetPills() {
  $$('.agent-pill').forEach(p => p.classList.remove('active', 'done'));
}

/* ---------- workspace tree polling ---------- */
async function refreshFiles() {
  try {
    const r = await fetch('/files');
    const data = await r.json();
    renderFiles(data.files || []);
  } catch (e) { /* ignore transient */ }
}
function renderFiles(files) {
  wsCount.textContent = `${files.length} file${files.length === 1 ? '' : 's'}`;
  if (!files.length) {
    wsList.innerHTML = '<div class="ws-empty">no files yet</div>';
    return;
  }
  wsList.innerHTML = '';
  for (const f of files) {
    const row = document.createElement('div');
    row.className = 'ws-file';
    row.innerHTML = `<span>${f.path}</span><span class="size">${f.size}b</span>`;
    row.onclick = () => openFile(f.path);
    wsList.appendChild(row);
  }
}
async function openFile(path) {
  const r = await fetch('/file?path=' + encodeURIComponent(path));
  const text = r.ok ? await r.text() : `(error ${r.status})`;
  fileViewerPath.textContent = path;
  fileViewerBody.textContent = text;
  fileViewer.classList.remove('hidden');
}
setInterval(refreshFiles, 2500);
refreshFiles();

/* ---------- websocket ---------- */
function wsUrl() {
  // If served from file://, sandbox iframe, or any context where location.host
  // is empty, fall back to localhost so we surface a useful error rather than
  // silently constructing ws:///ws.
  if (!location.host || location.protocol === 'file:') {
    return 'ws://127.0.0.1:8000/ws';
  }
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  return `${proto}://${location.host}/ws`;
}
function connect() {
  const url = wsUrl();
  console.log('[ws] connecting to', url, '· page origin:', location.origin || '(none)');
  const startedAt = performance.now();
  setConn('', `connecting to ${url}…`);
  let opened = false;

  ws = new WebSocket(url);

  // Hard 5s timeout — if we sit in CONNECTING for too long, the browser is
  // silently dropping the upgrade. Make that visible.
  const stillStuck = setTimeout(() => {
    if (!opened && ws && ws.readyState === WebSocket.CONNECTING) {
      setConn('err', `stuck CONNECTING after 5s (state=${ws.readyState}, url=${url})`);
      try { ws.close(); } catch {}
    }
  }, 5000);

  ws.onopen = () => {
    opened = true;
    clearTimeout(stillStuck);
    const ms = (performance.now() - startedAt).toFixed(0);
    console.log(`[ws] open in ${ms}ms`);
    setConn('ok', `connected (${ms}ms)`);
  };
  ws.onclose = (e) => {
    clearTimeout(stillStuck);
    console.warn('[ws] close', e.code, e.reason, 'wasClean=', e.wasClean);
    setConn('err', `disconnected: code=${e.code}${e.reason ? ' · ' + e.reason : ''}`);
    setTimeout(connect, 1500);
  };
  ws.onerror = (e) => {
    console.error('[ws] error', e);
    setConn('err', 'error (see console)');
  };
  ws.onmessage = (e) => {
    let m; try { m = JSON.parse(e.data); } catch { return; }
    handle(m);
  };
}

// One-time diagnostic banner. If the page was opened from anywhere other
// than http://localhost or http://127.0.0.1, the websocket cannot reach
// the backend and Send will silently no-op.
(function diagnose() {
  const ok = ['127.0.0.1', 'localhost'].includes(location.hostname) && location.protocol.startsWith('http');
  if (ok) return;
  const div = document.createElement('div');
  div.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;padding:10px 14px;background:#3a1a1a;color:#ffb4b4;font:12px/1.4 ui-monospace,monospace;border-bottom:2px solid #ff7a7a;';
  div.innerHTML = `⚠️ This page is loaded from <code>${location.href || '(no URL)'}</code> — the WebSocket can't reach the backend from here. Open <a href="http://127.0.0.1:8000" style="color:#ffe; text-decoration:underline;">http://127.0.0.1:8000</a> in a real browser tab.`;
  document.body.appendChild(div);
})();

function handle(m) {
  switch (m.type) {
    case 'ready':
      projectMeta.textContent = `project: ${m.project_dir}`;
      break;
    case 'session_started':
      setStatus('session ready');
      break;
    case 'session_reset':
      // wipe everything in the UI for a clean second life
      feed.innerHTML = '';
      containerStack = [feed];
      toolRows.clear();
      delegationBlocks.clear();
      resetPills();
      totalTurns = 0; turnsPill.textContent = 'turns: 0';
      resetCost();
      setStatus('session reset');
      chatMsg('system', '— new session —');
      break;
    case 'session_ended':
    case 'session_error':
      setStatus('session ended ' + (m.reason || m.error || ''), 'err');
      break;
    case 'turn_start':
      currentTurn = m.turn;
      inFlight = true;
      setStatus(`running turn ${m.turn}…`, 'ok');
      ev('turn-mark', null, [`turn ${m.turn} start`], m.user_text, m.sent_as);
      // bump queue: this user message is now leaving the queue
      bumpQueue(Math.max(0, queueSize - 1));
      break;
    case 'turn_done':
      inFlight = false;
      bumpTurns();
      setStatus(`idle (after turn ${m.turn})`);
      ev('turn-mark', null, [`turn ${m.turn} done`]);
      // pipeline pills: leave them as-is so the user can see who ran
      break;
    case 'turn_cancelled':
      inFlight = false;
      ev('turn-mark', null, [`turn ${m.turn} cancelled`]);
      setStatus('cancelled', 'warn');
      break;
    case 'turn_error':
      inFlight = false;
      ev('error', null, [`turn ${m.turn} error`], m.error);
      setStatus('error', 'err');
      break;

    case 'delegate_start':
      setPill(m.subagent, 'active');
      openDelegation(m.subagent, m.prompt, m.description, m.tool_use_id);
      break;
    case 'delegate_done':
      setPill(m.subagent, 'done');
      closeDelegation(m.subagent, m.text, m.tool_use_id);
      break;

    case 'agent_text': {
      // Render the model's prose as markdown — agents emit headings, lists,
      // bold and code that should be readable not raw.
      const el = document.createElement('div');
      el.className = `ev text body-md`;
      el.setAttribute('data-scope', m.agent);
      const head = document.createElement('div');
      head.className = 'head';
      const ts = new Date().toLocaleTimeString();
      head.innerHTML = `<span class="agent">${escapeHtml(m.agent)}</span> <span class="ts">${ts}</span>`;
      const body = document.createElement('div');
      body.className = 'body body-md';
      body.innerHTML = renderMarkdown(m.text);
      el.append(head, body);
      topContainer().appendChild(el);
      feed.scrollTop = feed.scrollHeight;
      break;
    }
    case 'agent_thinking':
      // Backend already drops empty thinking blocks; render the rest dimly.
      ev('thinking', m.agent, ['thinking'], m.text);
      break;
    case 'tool_use':
      renderToolRow(m.agent, m.tool, m.summary, m.input, m.tool_use_id);
      break;
    case 'tool_result':
      completeToolRow(m.tool_use_id, m.summary, m.is_error);
      break;
    case 'agent_result':
      if (typeof m.cost_usd === 'number') setCumulativeCost(m.cost_usd);
      ev('system', m.agent, [
        `cost: $${(m.cost_usd ?? 0).toFixed(4)}`,
        `${m.duration_ms ?? 0}ms`,
        `${m.num_turns ?? 0} model turns`,
      ]);
      // refresh workspace promptly after each turn
      refreshFiles();
      break;

    case 'queued':
      bumpQueue(m.queue_size);
      chatMsg('queued', `(queued for next turn) ${m.content}`);
      break;
    case 'workspace_cleared':
      chatMsg('system', 'workspace cleared');
      refreshFiles();
      break;
    case 'interrupted':
      chatMsg('system', 'interrupted current turn');
      break;
    case 'system':
      ev('system', null, [`system: ${m.subtype}`]);
      break;
    case 'error':
      chatMsg('system', `error: ${m.error}`);
      break;
    default:
      ev('system', null, [`unknown: ${m.type}`], JSON.stringify(m));
  }
}

/* ---------- send / queue ---------- */
function send() {
  const text = input.value.trim();
  if (!text) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    chatMsg('system', `cannot send — websocket is ${wsStateName()}. check the connection pill in the top bar.`);
    return;
  }
  ws.send(JSON.stringify({ type: 'user', content: text }));
  chatMsg('user', text);
  input.value = '';
}
function wsStateName() {
  if (!ws) return 'not initialized';
  return ['connecting', 'open', 'closing', 'closed'][ws.readyState] || 'unknown';
}

$('#send-btn').onclick = send;
$('#interrupt-btn').onclick = () => {
  if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'interrupt' }));
};
$('#reset-btn').onclick = () => {
  if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'reset' }));
};
$('#clear-btn').onclick = () => {
  if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'clear' }));
};
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

connect();
</script>
</body>
</html>
